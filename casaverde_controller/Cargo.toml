[package]
name = "casaverde_controller"
version = "0.1.1"
edition = "2024"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
tokio = { version = "1.0", features = ["full"] }
log = "0.4"
env_logger = "0.10"
serialport = "4.2"
toml = "0.5"
