[package]
name = "casaverde_controller"
version = "0.1.1"
edition = "2024"

[dependencies]
env_logger = "0.11.8"
log = "0.4.27"
ratatui = "0.29.0"
reqwest = { version = "0.12.22", features = ["json", "rustls-tls"], default-features = false }
rustls = "0.23.31"
rustls-pemfile = "2.2.0"
serde = { version = "1.0.219", features = ["derive"] }
tokio = { version = "1.47.1", features = ["full"] }
toml = "0.9.4"

