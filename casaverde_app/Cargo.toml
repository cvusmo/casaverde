[package]
name = "casaverde_app"
version = "0.1.1"
edition = "2024"

[dependencies]
ratatui = "0.29.0"
crossterm = "0.29.0"
reqwest = { version = "0.12.22", features = ["json", "rustls-tls"], default-features = false }
tokio = { version = "1.47.0", features = ["full"] }
serde = { version = "1.0.219", features = ["derive"] }
clap = { version = "4.5.42", features = ["derive"] }
