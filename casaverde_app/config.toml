# config.toml

server = "https://localhost:3003"
hostname = "localhost"
[logging]
level = "info"
[[configs]]
id = "blackbeard-cpu"
type = "temperature"
endpoint = "/sensor_data"
interval = 15
serial_port = "/dev/ttyACM0"

[[configs]]
id = "solar-1"
type = "solar"
endpoint = "/sensor_data"
serial_port = "/tmp/virtualcom0"
interval = 15

[[configs]]
id = "moisture-1"
type = "moisture"
endpoint = "/sensor_data"
serial_port = "/tmp/virtualcom0"
interval = 15

[[configs]]
id = "nutrients-1"
type = "nutrients"
endpoint = "/sensor_data"
serial_port = "/tmp/virtualcom0"
interval = 15

[[configs]]
id = "humidity-1"
type = "humidity"
endpoint = "/sensor_data"
serial_port = "/tmp/virtualcom0"
interval = 15

[[configs]]
id = "water-1"
type = "water"
endpoint = "/sensor_data"
serial_port = "/tmp/virtualcom0"
interval = 15

[[configs]]
id = "relay-1"
type = "relay"
endpoint = "/relay_control"
serial_port = "/tmp/virtualcom0"
interval = 15

[[configs]]
id = "blackbeard-probe"
type = "temperature"
endpoint = "/sensor_data"
serial_port = "/dev/ttyACM0"
interval = 15
